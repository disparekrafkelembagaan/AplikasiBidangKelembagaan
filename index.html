<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Aplikasi...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .loader-container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        // Proses pengalihan langsung ke Google Apps Script Anda
        window.location.href = "https://script.google.com/macros/s/AKfycbzW3TpTrq6JhwYyYBYnh2lhr0lBlDU4lI912fXjWQ4oAy4cIIZLglnNjgbbAXU15xgMWw/exec";
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>Menghubungkan ke aplikasi, mohon tunggu...</p>
        <p style="font-size: 12px; color: #888;">Jika tidak beralih otomatis, <a href="https://script.google.com/macros/s/AKfycbzW3TpTrq6JhwYyYBYnh2lhr0lBlDU4lI912fXjWQ4oAy4cIIZLglnNjgbbAXU15xgMWw/exec">klik di sini</a>.</p>
    </div>
</body>
</html>
