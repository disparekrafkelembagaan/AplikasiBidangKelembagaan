<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Web Apps Script</title>
    <style>
        /* Mengatur agar halaman memenuhi layar tanpa scroll bawaan browser */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #ffffff;
        }
        
        /* Mengatur iframe Apps Script agar memenuhi halaman penuh */
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            z-index: 999999;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbzW3TpTrq6JhwYyYBYnh2lhr0lBlDU4lI912fXjWQ4oAy4cIIZLglnNjgbbAXU15xgMWw/exec" 
            allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; hdmi-audio-access" 
            allowfullscreen="true">
    </iframe>

</body>
</html>
